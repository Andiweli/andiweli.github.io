<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Andreas Stürmer — @andiweli</title>
  <meta name="description" content="Retro gaming ports, launchers, themes and asset packs by Andreas Stürmer / @andiweli." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbfaf8;
      --card: #ffffff;
      --ink: #11151c;
      --text: #30353d;
      --muted: #7a8089;
      --line: #e8e4df;
      --soft: #f8f4f1;
      --accent: #f25d49;
      --accent-dark: #d94836;
      --shadow: 0 22px 70px rgba(26, 22, 18, .075);
      --radius: 20px;
      --max: 1180px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(242,93,73,.06), transparent 32rem),
        linear-gradient(180deg, #fff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .site {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 28px;
      min-height: 46px;
      margin-bottom: 22px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: clamp(22px, 3.6vw, 50px);
      font-size: .98rem;
      color: #1f242b;
      margin-left: auto;
    }

    .nav a:not(.github-btn) {
      position: relative;
      padding: 10px 0;
      white-space: nowrap;
    }

    .nav a:not(.github-btn)::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 2px;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: var(--accent);
      transform: translateX(-50%);
      transition: width .2s ease;
    }

    .nav a:hover { color: var(--accent); }
    .nav a:hover::after { width: 24px; }

    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 11px 16px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff !important;
      font-weight: 760;
      box-shadow: 0 12px 26px rgba(242, 93, 73, .22);
    }
    .github-btn:hover { background: var(--accent-dark); }

    .hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(330px, .75fr);
      gap: clamp(24px, 3.4vw, 46px);
      min-height: 360px;
      padding: clamp(28px, 3.8vw, 46px);
      position: relative;
      overflow: hidden;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 690px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: .78rem;
      letter-spacing: .11em;
      text-transform: uppercase;
      font-weight: 800;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.9rem, 4.2vw, 4.05rem);
      line-height: 1.02;
      letter-spacing: -.055em;
      font-weight: 830;
      white-space: nowrap;
    }

    .handle {
      margin-top: 14px;
      color: var(--accent);
      font-size: clamp(1.25rem, 2.2vw, 1.75rem);
      font-weight: 760;
      letter-spacing: -.035em;
    }

    .rule { width: 100%; height: 1px; background: var(--line); margin: 20px 0 18px; }
    .intro { max-width: 560px; margin: 0; font-size: clamp(1rem, 1.7vw, 1.18rem); color: #3d434d; }

    .pills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #2e333b;
      font-size: .9rem;
      box-shadow: 0 8px 24px rgba(20, 15, 10, .035);
      font-weight: 650;
    }
    .pill-mark { color: var(--accent); font-weight: 900; }

    .portrait-wrap {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 380px) 46px;
      justify-self: end;
      align-self: center;
      max-width: 450px;
      width: 100%;
      gap: 16px;
    }

    .portrait-card {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      min-height: 300px;
      background: var(--soft);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.68), 0 18px 42px rgba(26, 22, 18, .08);
      isolation: isolate;
    }
    .portrait-card::before {
      content: '';
      position: absolute;
      width: 170px;
      height: 170px;
      right: 3%;
      top: 20%;
      border-radius: 50%;
      background: rgba(242, 93, 73, .9);
      z-index: 1;
    }
    .portrait-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(17,21,28,.18) 1px, transparent 1px);
      background-size: 17px 17px;
      opacity: .16;
      z-index: 2;
      pointer-events: none;
      mask-image: linear-gradient(90deg, #000 0, transparent 48%);
    }
    .portrait-card img { position: relative; z-index: 3; width: 100%; height: 100%; object-fit: cover; object-position: center; }

    .vertical-note {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2f343c;
      font-size: .74rem;
      font-weight: 800;
      letter-spacing: .27em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    .vertical-note span { color: var(--accent); margin: 14px 0; }

    .section-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      margin: 32px 0 20px;
    }
    .section-title { margin: 0; color: #1f252d; font-size: .86rem; letter-spacing: .05em; text-transform: uppercase; font-weight: 860; }
    .section-line { height: 1px; background: var(--line); }
    .view-link { display: inline-flex; align-items: center; gap: 10px; color: var(--accent); font-size: .94rem; font-weight: 740; white-space: nowrap; }

    .news-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 18px 55px rgba(26,22,18,.055);
      padding: 25px 30px 24px;
    }
    .news-card h3 {
      margin: 0 0 13px;
      color: var(--ink);
      font-size: clamp(1.42rem, 2vw, 1.82rem);
      line-height: 1.05;
      letter-spacing: normal;
      font-weight: bold;
    }
    .news-list { margin: 0; padding: 0; list-style: none; color: #515862; font-size: .86rem; line-height: 1.48; }
    .news-list > li {
      display: grid;
      grid-template-columns: .42rem 1fr;
      column-gap: .72rem;
      align-items: start;
      margin: .35rem 0;
      padding: 0;
    }
    .news-list > li::before { content: ''; width: .38rem; height: .38rem; margin-top: .56em; border-radius: 50%; background: var(--accent); }
    .news-list a { color: var(--accent); font-weight: 700; }
    .news-list a:hover { text-decoration: underline; }
    .news-placeholder { display: none; align-items: center; gap: 10px; margin: 0; color: #747b85; font-size: .86rem; }
    .news-list:empty { display: none; }
    .news-list:empty + .news-placeholder { display: flex; }

    .featured-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .feature-card {
      min-height: 188px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(255,255,255,.88));
      box-shadow: 0 18px 55px rgba(26,22,18,.055);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      position: relative;
      isolation: isolate;
    }
    .feature-text {
      grid-column: 1;
      grid-row: 1;
      width: min(100%, 68%);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      grid-template-rows: auto auto 1fr auto;
      column-gap: 12px;
      align-items: baseline;
      padding: 21px 18px 20px 24px;
      z-index: 3;
      min-height: 188px;
      text-shadow: 0 0 1px rgba(255,255,255,.98), 0 0 7px rgba(255,255,255,.92), 0 1px 12px rgba(255,255,255,.88);
    }
    .feature-card.zgloom .feature-text, .feature-card.unreal .feature-text { width: min(100%, 62%); }
    .num { color: var(--accent); font-weight: 850; font-size: .92rem; letter-spacing: .03em; margin: 0; grid-column: 1; grid-row: 1; line-height: 1.1; }
    .feature-card h3 {
      grid-column: 2;
      grid-row: 1;
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.42rem, 2vw, 1.82rem);
      line-height: 1.05;
      white-space: nowrap;
      min-width: 0;
    }
    .meta { grid-column: 1 / -1; grid-row: 2; margin: 9px 0 9px; color: var(--accent); font-size: .78rem; font-weight: 820; letter-spacing: .04em; }
    .feature-card p { grid-column: 1 / -1; grid-row: 3; margin: 0; max-width: none; color: #515862; font-size: .86rem; line-height: 1.48; }
    .card-btn {
      grid-column: 1 / -1;
      grid-row: 4;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: max-content;
      max-width: 100%;
      justify-self: start;
      align-self: end;
      margin-top: 14px;
      padding: 8px 12px;
      border: 1px solid rgba(242,93,73,.35);
      border-radius: 10px;
      color: var(--accent);
      font-size: .86rem;
      font-weight: 780;
      background: rgba(255,255,255,.72);
      box-shadow: 0 0 0 4px rgba(255,255,255,.72), 0 10px 26px rgba(26,22,18,.05);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      text-shadow: none;
    }
    .feature-media { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: .67; }
    .feature-media img { width: 118%; height: 118%; max-width: none; max-height: none; object-fit: contain; object-position: right center; transform: translate(7%, 4%) scale(1.1); filter: drop-shadow(0 20px 34px rgba(20, 17, 14, .12)); }
    .feature-card.zgloom .feature-media img { width: 112%; height: 112%; object-position: right bottom; transform: translate(6%, 8%) scale(1.12); }
    .feature-card.unreal .feature-media img { width: 120%; height: 120%; object-position: right bottom; transform: translate(8%, 9%) scale(1.12); }

    .quote-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #fff 0%, #fff 60%, rgba(242,93,73,.045) 100%);
      box-shadow: 0 18px 55px rgba(26,22,18,.055);
      padding: 28px 30px;
      min-height: 188px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .quote-mark { font-size: 3rem; line-height: .7; color: var(--accent); font-weight: 900; margin-bottom: 16px; }
    .quote-card p { margin: 0; max-width: none; color: #25303a; font-size: clamp(1.1rem, 1.7vw, 1.34rem); line-height: 1.45; }
    .quote-icons { display: flex; flex-wrap: wrap; gap: 24px; margin-top: 22px; color: #303641; font-size: .9rem; }

    .core-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 18px; }
    .repo-card {
      min-height: 158px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: var(--card);
      padding: 20px;
      box-shadow: 0 14px 42px rgba(26,22,18,.045);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .repo-card:hover { transform: translateY(-2px); box-shadow: 0 18px 48px rgba(26,22,18,.075); }
    .repo-head { display: flex; align-items: center; gap: 12px; }
    .repo-icon { width: 38px; height: 38px; border-radius: 11px; background: #f1efec; display: grid; place-items: center; color: #242a32; font-weight: 900; flex: 0 0 auto; }
    .repo-icon svg { width: 22px; height: 22px; display: block; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .repo-icon.fill svg { fill: currentColor; stroke: none; }
    .repo-icon.android { color: #3ddc84; }
    .repo-icon.controller { color: #42526e; }
    .repo-icon.editor { color: #7b61ff; }
    .repo-icon.solar { color: #e4a21a; }
    .repo-icon.ouya { color: #f25d49; }
    .repo-icon.windows { color: #1f8cff; }
    .repo-icon.apple { color: #11151c; }
    .repo-icon.vita { color: #2f6bf2; }
    .repo-card h4 { margin: 0; font-size: 1rem; color: #1d232b; line-height: 1.2; }
    .repo-card p { margin: 0; color: #666e79; font-size: .86rem; line-height: 1.42; }
    .repo-meta { margin-top: auto; display: flex; justify-content: space-between; gap: 16px; color: #8b929b; font-size: .78rem; }

    .footer-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 28px; border-top: 1px solid var(--line); padding-top: 24px; }
    .footer-box { border: 1px solid var(--line); border-radius: 17px; background: rgba(255,255,255,.76); min-height: 128px; padding: 24px 26px; display: grid; grid-template-columns: 64px 1fr; gap: 18px; align-items: center; }
    .footer-icon { width: 58px; height: 58px; border-radius: 50%; display: grid; place-items: center; background: var(--accent); color: #fff; }
    .footer-box h4 { margin: 0 0 4px; color: #1d232b; font-size: 1rem; }
    .footer-box p { margin: 0; color: #6e7580; font-size: .9rem; }
    .footer-box a { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; color: var(--accent); font-weight: 800; font-size: .9rem; }
    .footer-box.centered { grid-template-columns: 1fr; text-align: center; }
    .footer-box.centered .heart { color: var(--accent); font-size: 1.35rem; margin-top: 8px; }
    .copyright { display: flex; justify-content: space-between; gap: 20px; color: #8d939c; font-size: .86rem; margin-top: 18px; padding: 0 18px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); margin-left: 8px; }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .portrait-wrap { justify-self: stretch; max-width: none; grid-template-columns: 1fr; }
      .portrait-card { min-height: 340px; }
      .vertical-note { display: none; }
      h1 { white-space: normal; }
      .featured-grid, .core-grid, .footer-strip { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .site { width: min(100% - 24px, var(--max)); padding-top: 18px; }
      .topbar { justify-content: center; }
      .nav { gap: 16px; font-size: .85rem; flex-wrap: wrap; justify-content: center; }
      .hero { padding: 26px 20px; border-radius: 18px; }
      h1 { font-size: clamp(2.7rem, 15vw, 4rem); }
      .portrait-card { min-height: 330px; border-radius: 28px; }
      .section-head { grid-template-columns: auto 1fr; }
      .section-head .view-link { grid-column: 1 / -1; }
      .news-card { padding: 22px; border-radius: 18px; }
      .feature-text, .feature-card.zgloom .feature-text, .feature-card.unreal .feature-text { width: 100%; padding-right: 120px; }
      .feature-card h3 { white-space: normal; }
      .feature-media img, .feature-card.zgloom .feature-media img, .feature-card.unreal .feature-media img { width: 100%; height: 100%; transform: translate(22%, 8%) scale(1.12); opacity: .86; }
      .repo-meta { flex-direction: column; gap: 4px; }
      .copyright { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="site">
    <header class="topbar" aria-label="Site header">
      <nav class="nav" aria-label="Main navigation">
        <a href="#news">News</a>
        <a href="#featured">Featured</a>
        <a href="#core">Core</a>
        <a class="github-btn" href="https://github.com/andiweli" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </header>

    <main id="app" aria-live="polite"></main>
  </div>

  <script>
    const DEFAULT_CONTENT = {
      site: {
        title: 'Andreas Stürmer', handle: '@andiweli', kicker: 'Home',
        intro: 'I build retro gaming ports, launchers, themes and asset packs with a focus on quality, usability and platform love.',
        profileImage: 'images/profile.png', profileAlt: 'Illustrated portrait of Andreas Stürmer with an orange cat',
        verticalNote: 'Design • Code • Restore • Play', tags: ['Android', 'Windows', 'macOS', 'OUYA', 'Smarthome'], footerYear: '2026'
      },
      news: { title: 'Current News', headline: 'Currently working on...', emptyText: 'Nothing listed yet — probably busy teaching old hardware new tricks.', items: [] },
      featured: { title: 'Featured Projects', viewAllLabel: 'View all projects →', viewAllUrl: 'https://github.com/Andiweli?tab=repositories', quote: 'I love bringing classic experiences to new platforms and devices.', quoteTags: ['🎮 Play', '⌘ Build', '♡ Restore'], items: [] },
      core: { title: 'Core Projects', viewAllLabel: 'View all repositories on GitHub →', viewAllUrl: 'https://github.com/Andiweli?tab=repositories', items: [] }
    };

    const ICONS = {
      android: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 9.5h10v6.1c0 .9-.7 1.6-1.6 1.6H8.6c-.9 0-1.6-.7-1.6-1.6V9.5Zm2.2-2.1L7.7 4.8a.8.8 0 0 1 1.4-.8l1.5 2.6a6.7 6.7 0 0 1 2.8 0L14.9 4a.8.8 0 1 1 1.4.8l-1.5 2.6H9.2ZM9 12.1a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm6 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM5 10h1v5H5c-.6 0-1-.4-1-1v-3c0-.6.4-1 1-1Zm13 0h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1h-1v-5Z"/></svg>',
      controller: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 16v-2M17 16v-2M8.5 8h7A5.5 5.5 0 0 1 21 13.5v.8a2.7 2.7 0 0 1-4.8 1.7l-1.3-1.6H9.1L7.8 16A2.7 2.7 0 0 1 3 14.3v-.8A5.5 5.5 0 0 1 8.5 8Z"/><path d="M8 11.5h3M9.5 10v3M15 11.5h.01M17 11.5h.01"/></svg>',
      editor: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="12.5" height="12.5" rx="2"/><path d="M4 8h12.5M8 12h4.5M15 15l5 2-2.2 1.1L19 21l-1.6.7-1.2-2.9-2.2 1.1 1-4.9Z"/></svg>',
      solar: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 16.5h16M6 16.5l2.6-7.8h6.8l2.6 7.8M9 8.7 10.4 5h3.2L15 8.7M8.2 12.5h7.6M7 19h10"/></svg>',
      ouya: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 16v-2M17 16v-2M8.5 8h7A5.5 5.5 0 0 1 21 13.5v.8a2.7 2.7 0 0 1-4.8 1.7l-1.3-1.6H9.1L7.8 16A2.7 2.7 0 0 1 3 14.3v-.8A5.5 5.5 0 0 1 8.5 8Z"/><path d="M8 11.5h3M9.5 10v3M15 11.5h.01M17 11.5h.01"/></svg>',
      windows: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5.2 10.7 4v7.5H3V5.2Zm8.7-1.35L21 2.5v9h-9.3V3.85ZM3 12.5h7.7V20L3 18.8v-6.3Zm8.7 0H21v9l-9.3-1.35V12.5Z"/></svg>',
      apple: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.9 12.5c0-2 1.7-3 1.8-3.1-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.8-3.1.8-.7 0-1.7-.8-2.8-.8-1.4 0-2.8.9-3.5 2.2-1.5 2.6-.4 6.4 1.1 8.5.7 1 1.6 2.2 2.7 2.1 1.1 0 1.5-.7 2.8-.7s1.7.7 2.9.7c1.2 0 2-1 2.7-2.1.8-1.2 1.1-2.3 1.1-2.4 0 0-2.7-1-2.7-3.6ZM14.8 6.4c.6-.8 1-1.8.9-2.9-.9 0-1.9.6-2.5 1.3-.6.7-1 1.8-.9 2.8.9.1 1.9-.5 2.5-1.2Z"/></svg>',
      vita: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="6" width="17" height="11" rx="3"/><path d="M8 17h8M9 20h6M7.2 9.5h3.2M8.8 8v3M15.2 9.5h.01M17.4 11.4h.01"/></svg>'
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function linkifyNews(item) {
      const text = escapeHtml(item.text || '');
      const label = String(item.linkLabel || '').trim();
      const url = String(item.url || '').trim();
      if (!label || !url || !text.includes(escapeHtml(label))) {
        return `${text}${url ? ` <a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label || 'Link')}</a>` : ''}`;
      }
      return text.replace(escapeHtml(label), `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`);
    }

    function render(data) {
      const site = data.site || DEFAULT_CONTENT.site;
      const news = data.news || DEFAULT_CONTENT.news;
      const featured = data.featured || DEFAULT_CONTENT.featured;
      const core = data.core || DEFAULT_CONTENT.core;
      document.title = `${site.title || 'Andreas Stürmer'} — ${site.handle || '@andiweli'}`;

      const featuredCards = (featured.items || []).map((item, index) => `
        <article class="feature-card ${escapeHtml(item.className || '')}">
          <div class="feature-text">
            <div class="num">${String(index + 1).padStart(2, '0')}</div>
            <h3>${escapeHtml(item.title)}</h3>
            <div class="meta">${escapeHtml(item.meta)}</div>
            <p>${escapeHtml(item.description)}</p>
            <a class="card-btn" href="${escapeHtml(item.url)}">${escapeHtml(item.button || 'View project →')}</a>
          </div>
          <div class="feature-media"><img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.alt || item.title)}" /></div>
        </article>
      `).join('');

      const coreCards = (core.items || []).map((item) => {
        const icon = item.icon || 'editor';
        const fill = ['android', 'windows', 'apple'].includes(icon) ? 'fill' : '';
        return `
          <a class="repo-card" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">
            <div class="repo-head"><span class="repo-icon ${escapeHtml(icon)} ${fill}">${ICONS[icon] || ICONS.editor}</span><h4>${escapeHtml(item.title)}</h4></div>
            <p>${escapeHtml(item.description)}</p>
            <div class="repo-meta"><span>${escapeHtml(item.subtitle)}</span><span>${escapeHtml(item.tech)}</span></div>
          </a>
        `;
      }).join('');

      document.getElementById('app').innerHTML = `
        <section id="home" class="hero">
          <div class="hero-copy">
            <div class="kicker">${escapeHtml(site.kicker)}</div>
            <h1>${escapeHtml(site.title)}</h1>
            <div class="handle">${escapeHtml(site.handle)}</div>
            <div class="rule"></div>
            <p class="intro">${escapeHtml(site.intro)}</p>
            <div class="pills" aria-label="Platforms">${(site.tags || []).map(tag => `<span class="pill"><span class="pill-mark">•</span>${escapeHtml(tag)}</span>`).join('')}</div>
          </div>
          <div class="portrait-wrap">
            <div class="portrait-card"><img src="${escapeHtml(site.profileImage)}" alt="${escapeHtml(site.profileAlt)}" /></div>
            <div class="vertical-note">${escapeHtml(site.verticalNote || '').replaceAll('•', '<span>•</span>')}</div>
          </div>
        </section>

        <section id="news" aria-labelledby="news-title">
          <div class="section-head">
            <h2 id="news-title" class="section-title">${escapeHtml(news.title)}</h2>
            <div class="section-line"></div>
          </div>
          <div class="news-card">
            <h3>${escapeHtml(news.headline)}</h3>
            <ul class="news-list">${(news.items || []).map(item => `<li><span>${linkifyNews(item)}</span></li>`).join('')}</ul>
            <p class="news-placeholder"><span class="emoji" aria-hidden="true">🕹️</span>${escapeHtml(news.emptyText)}</p>
          </div>
        </section>

        <section id="featured" aria-labelledby="featured-title">
          <div class="section-head">
            <h2 id="featured-title" class="section-title">${escapeHtml(featured.title)}</h2>
            <div class="section-line"></div>
            <a class="view-link" href="${escapeHtml(featured.viewAllUrl)}" target="_blank" rel="noopener">${escapeHtml(featured.viewAllLabel)}</a>
          </div>
          <div class="featured-grid">
            ${featuredCards}
            <aside class="quote-card">
              <div class="quote-mark">“</div>
              <p>${escapeHtml(featured.quote)}</p>
              <div class="quote-icons">${(featured.quoteTags || []).map(tag => `<span>${escapeHtml(tag)}</span>`).join('')}</div>
            </aside>
          </div>
        </section>

        <section id="core" aria-labelledby="core-title">
          <div class="section-head">
            <h2 id="core-title" class="section-title">${escapeHtml(core.title)}</h2>
            <div class="section-line"></div>
            <a class="view-link" href="${escapeHtml(core.viewAllUrl)}" target="_blank" rel="noopener">${escapeHtml(core.viewAllLabel)}</a>
          </div>
          <div class="core-grid">${coreCards}</div>
        </section>

        <footer class="footer-strip" aria-label="Footer">
          <div class="footer-box">
            <div class="footer-icon">GH</div>
            <div><h4>GitHub</h4><p>Explore source code, tools and more projects.</p><a href="https://github.com/andiweli" target="_blank" rel="noopener">github.com/andiweli ↗</a></div>
          </div>
          <div class="footer-box centered"><div><h4>Crafted with passion.</h4><p>For the love of retro.</p><div class="heart">♥</div></div></div>
        </footer>
        <div class="copyright"><span>© ${escapeHtml(site.footerYear || new Date().getFullYear())} ${escapeHtml(site.title)} — ${escapeHtml(site.handle)}</span><span>Built with passion.<i class="dot"></i></span></div>
      `;
    }

    async function loadContent() {
      try {
        const response = await fetch('content.json?cache=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('content.json not found');
        return await response.json();
      } catch (error) {
        console.warn('Using fallback content:', error.message);
        return DEFAULT_CONTENT;
      }
    }

    loadContent().then(render);
  </script>
</body>
</html>
